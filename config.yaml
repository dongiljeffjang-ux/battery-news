# ── 해시태그 사전 (업체명·소재·application) ──
# 제목+요약에 아래 '값'들이 들어 있으면 해당 '태그'를 기사에 부착.
# 한 기사에 여러 태그가 붙을 수 있음. 운영자가 자유롭게 추가.
hashtags:
  # 국내 업체
  "LG에너지솔루션": ["LG에너지솔루션", "LG엔솔", "LGES"]
