# ════════════════════════════════════════════════════════
#  배터리 시장 뉴스 파이프라인 설정
#  운영자는 이 파일만 수정하면 됩니다.
# ════════════════════════════════════════════════════════

# ── 검색 키워드 (네이버/구글 뉴스 검색어) ──
# 전기차 + ESS 등 배터리 시장 중심. 자유롭게 추가/삭제.
keywords:
  - "전기차 배터리"
  - "ESS 에너지저장장치"
  - "이차전지"
  - "리튬이온 배터리"
  - "양극재"
  - "전고체 배터리"
  - "배터리 재활용"
  - "LFP 배터리"

# ── 수집 옵션 ──
sources:
  naver:
    enabled: true        # NAVER_CLIENT_ID/SECRET 없으면 자동 skip
    display: 30
    sort: "date"
  google:
    enabled: true
    hl: "ko"
    gl: "KR"
    ceid: "KR:ko"
    max_items: 30

max_age_days: 2          # 최근 N일 기사만 (매일 실행 가정)

# ── STEEP 분류 사전 (규칙기반 키워드 매칭) ──
# 기사 제목+요약에 아래 단어가 많이 포함된 카테고리로 분류.
# 어디에도 안 걸리면 'Uncategorized'.
# ── Application (응용처) 분류 사전 ──
# 대표 하나로 분류. 어디에도 안 걸리면 'Etc'.
application:
  EV:            # 전기차
    - "전기차"
    - "EV"
    - "승용"
    - "상용차"
    - "전기트럭"
    - "전기버스"
    - "BEV"
    - "xEV"
  ESS:           # 에너지저장장치
    - "ESS"
    - "에너지저장"
    - "전력망"
    - "계통"
    - "UPS"
    - "그리드"
    - "태양광 연계"
  SmallIT:       # 소형·IT기기
    - "노트북"
    - "스마트폰"
    - "전동공구"
    - "파워툴"
    - "가전"
    - "웨어러블"
    - "드론"
    - "로봇"
  Micromobility: # e-모빌리티
    - "전기자전거"
    - "e-바이크"
    - "전동킥보드"
    - "전동스쿠터"
    - "마이크로모빌리티"

# ── 소재·부품 분류 사전 ──
# 대표 하나로 분류. 어디에도 안 걸리면 'Etc'.
