# ════════════════════════════════════════════════════════
#  배터리 시장 뉴스 파이프라인 설정
#  운영자는 이 파일만 수정하면 됩니다.
# ════════════════════════════════════════════════════════

# ── 검색 키워드 (네이버/구글 뉴스 검색어) ──
# 전기차 + ESS 등 배터리 시장 중심. 자유롭게 추가/삭제.
keywords:
  - "전기차 배터리"
  - "ESS 에너지저장장치"
  - "이차전지"
  - "리튬이온 배터리"
  - "양극재"
  - "전고체 배터리"
  - "배터리 재활용"
  - "LFP 배터리"

# ── 수집 옵션 ──
sources:
  naver:
    enabled: true        # NAVER_CLIENT_ID/SECRET 없으면 자동 skip
    display: 30
    sort: "date"
  google:
    enabled: true
    hl: "ko"
    gl: "KR"
    ceid: "KR:ko"
    max_items: 30

max_age_days: 2          # 최근 N일 기사만 (매일 실행 가정)

# ── STEEP 분류 사전 (규칙기반 키워드 매칭) ──
# 기사 제목+요약에 아래 단어가 많이 포함된 카테고리로 분류.
# 어디에도 안 걸리면 'Uncategorized'.
steep:
  Social:        # 사회
    - "소비자"
    - "안전"
    - "화재"
    - "일자리"
    - "고용"
    - "노동"
    - "수요"
    - "소비"
  Technological: # 기술
    - "전고체"
    - "양극재"
    - "음극재"
    - "전해질"
    - "에너지밀도"
    - "연구"
    - "개발"
    - "특허"
    - "기술"
    - "LFP"
    - "NCM"
  Economic:      # 경제
    - "투자"
    - "매출"
    - "실적"
    - "공장"
    - "증설"
    - "수출"
    - "가격"
    - "시장"
    - "점유율"
    - "계약"
    - "수주"
    - "주가"
  Environmental: # 환경
    - "재활용"
    - "친환경"
    - "탄소"
    - "폐배터리"
    - "ESG"
    - "리사이클"
    - "온실가스"
  Political:     # 정치/정책
    - "정책"
    - "규제"
    - "보조금"
    - "IRA"
    - "관세"
    - "정부"
    - "법안"
    - "협정"
    - "제재"

# ── 요약 방식 (규칙기반) ──
summary:
  max_sentences: 2       # 원문 설명에서 앞 N문장 추출
  max_chars: 180

# ── 이메일 수신자 목록 (운영자 관리) ──
# GitHub Secret 으로도 덮어쓸 수 있음(MAIL_TO, 쉼표구분).
recipients:
  - "example1@example.com"
  - "example2@example.com"

email:
  subject_prefix: "[배터리 뉴스]"
  sender_name: "Battery News Bot"

output:
  json_db: "data/news.json"      # 메인 DB (웹이 읽음)
  md_archive: "data/news.md"     # 사람이 보는 백업 아카이브

# ── 권역 분류 사전 ──
# 제목+요약에 아래 단어가 가장 많이 매칭된 권역으로 분류.
