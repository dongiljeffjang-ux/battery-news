<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>배터리 뉴스 · 접속</title>
<style>
  :root{
    --bg:#0e1320; --panel:#161d2e; --line:#27304a;
    --ink:#e8edf7; --muted:#8a96b3; --accent:#22d3ee; --accent2:#34d399;
    --danger:#fb7185;
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;background:
      radial-gradient(900px 500px at 80% -10%, rgba(34,211,238,.08), transparent),
      var(--bg);
    color:var(--ink);
    font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:grid;place-items:center;padding:24px;
  }
  .card{
    width:100%;max-width:380px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:36px 32px;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .badge{
    font:600 12px/1 ui-monospace,"SF Mono",Menlo,monospace;
    letter-spacing:.18em;color:var(--accent);text-transform:uppercase;
  }
  h1{font-size:22px;margin:14px 0 4px;letter-spacing:-.01em}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 26px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px;
    letter-spacing:.04em}
  input{
    width:100%;padding:13px 14px;background:#0c111c;color:var(--ink);
    border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none;
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,211,238,.15)}
  button{
    width:100%;margin-top:18px;padding:13px;border:0;border-radius:10px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#06121a;font-weight:700;font-size:15px;cursor:pointer;
    transition:filter .15s;
  }
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.6;cursor:default}
  .err{color:var(--danger);font-size:13px;margin-top:14px;min-height:18px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">
    <div class="badge">🔋 Battery Market Intel</div>
    <h1>뉴스 아카이브 접속</h1>
    <p class="sub">권한이 있는 사용자만 누적 뉴스와 대시보드를 볼 수 있습니다.</p>
    <label for="pw">접속 비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password"
           placeholder="비밀번호 입력" />
    <button id="go">접속하기</button>
    <div class="err" id="err"></div>
  </main>
<script>
  const pw=document.getElementById('pw'),btn=document.getElementById('go'),
        err=document.getElementById('err');
  async function submit(){
    err.textContent='';btn.disabled=true;btn.textContent='확인 중…';
    try{
      const r=await fetch('/api/login',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:pw.value})});
      if(r.ok){location.href='/dashboard';return;}
      const d=await r.json().catch(()=>({}));
      err.textContent=d.error==='invalid_password'
        ?'비밀번호가 올바르지 않습니다.':'접속에 실패했습니다.';
    }catch{err.textContent='네트워크 오류가 발생했습니다.';}
    btn.disabled=false;btn.textContent='접속하기';
  }
  btn.onclick=submit;
  pw.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
</script>
</body>
</html>
